<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Check - Calendar</title>
    <!-- Bootswatch Theme -->
    <link id="themeStylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css" rel="stylesheet">
    <!-- FullCalendar JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        #calendar { margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.3s; }
        .fc-event { cursor: pointer; }
        .fc-theme-standard td, .fc-theme-standard th { border-color: var(--bs-border-color); }
        .fc-col-header-cell-cushion, .fc-daygrid-day-number { color: var(--bs-body-color); text-decoration: none; }
        
        /* Grid Alignment Fix: resolve box-sizing/border collapse issues causing vertical offset */
        .fc-timegrid-event,
        .fc-timegrid-slot {
            box-sizing: border-box !important;
        }
        .fc-timegrid-slots table,
        .fc-timegrid-cols table,
        .fc-scrollgrid {
            border-collapse: collapse !important;
        }
        
        /* Enhance grid and border visibility in light mode for better contrast */
        .light-theme .fc-theme-standard td, 
        .light-theme .fc-theme-standard th {
            border: 1px solid #868e96 !important;
        }
        .light-theme .form-control,
        .light-theme .form-select {
            border: 1px solid #868e96 !important;
        }
        .light-theme .card {
            border: 1px solid #868e96 !important;
        }
        .fc-daygrid-day-events {
            max-height: 100px !important;
            overflow: hidden !important;
        }
        
        /* Dark Mode styles for FullCalendar popovers (+X more) */
        .fc-popover {
            background-color: #2b3035 !important;
            border: 1px solid #495057 !important;
            color: #fff !important;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5) !important;
        }
        .fc-popover-header {
            background-color: #212529 !important;
            color: #fff !important;
            border-bottom: 1px solid #495057 !important;
        }
        .fc-popover-body {
            background-color: #2b3035 !important;
            color: #fff !important;
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#222; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h2 class="mb-4">Status Check - Login</h2>
        <form id="loginForm" style="width: 300px;">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="loginUsername" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">Status Check</a>
            <div class="d-flex align-items-center">
                <button id="themeToggleBtn" class="btn btn-outline-light btn-sm me-3">☀️ Light Mode</button>
                <button id="navLogoutBtn" class="btn btn-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 mb-4">
        <div class="row g-3 mb-4">
            <!-- Stats Section -->
            <div class="col-lg-5">
                <div class="d-flex gap-3 h-100">
                    <div class="card flex-fill border-success border-start border-4 shadow-sm">
                        <div class="card-body py-2 px-3">
                            <div class="text-muted small fw-bold text-uppercase">Done</div>
                            <div class="fs-4 fw-bold text-success" id="statDone">0</div>
                        </div>
                    </div>
                    <div class="card flex-fill border-warning border-start border-4 shadow-sm">
                        <div class="card-body py-2 px-3">
                            <div class="text-muted small fw-bold text-uppercase">To Check</div>
                            <div class="fs-4 fw-bold text-warning" id="statToCheck">0</div>
                        </div>
                    </div>
                    <div class="card flex-fill border-danger border-start border-4 shadow-sm">
                        <div class="card-body py-2 px-3">
                            <div class="text-muted small fw-bold text-uppercase">Expired</div>
                            <div class="fs-4 fw-bold text-danger" id="statExpired">0</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Filters Section -->
            <div class="col-lg-7">
                <div class="card shadow-sm h-100">
                    <div class="card-body py-2 d-flex align-items-center">
                        <div class="row g-2 w-100 align-items-center">
                            <div class="col-md-4">
                                <input type="text" class="form-control form-control-sm" id="filterProject" placeholder="Filter by Project...">
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control form-control-sm" id="filterReviewer" placeholder="Filter by Reviewer...">
                            </div>
                            <div class="col-md-4 text-end">
                                <button class="btn btn-primary btn-sm me-2" id="btnApplyFilters">Apply</button>
                                <button class="btn btn-outline-secondary btn-sm" id="btnClearFilters">Clear</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="calendar"></div>
    </div>

    <!-- Modal for Create/Edit -->
    <div class="modal fade" id="commitmentModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="commitmentForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Commitment</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="commitmentId">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Title*</label>
                                <input type="text" class="form-control" id="title" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Author*</label>
                                <input type="text" class="form-control" id="author" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Project</label>
                                <input type="text" class="form-control" id="project">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Status</label>
                                <select class="form-select" id="status">
                                    <option value="to check">To Check</option>
                                    <option value="expired">Expired</option>
                                    <option value="done">Done</option>
                                    <option value="not actual">Not Actual</option>
                                    <option value="ideas backlog">Ideas Backlog</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Assignee</label>
                                <input type="text" class="form-control" id="assignee">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Reviewer</label>
                                <input type="text" class="form-control" id="reviewer">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Deadline</label>
                            <input type="datetime-local" class="form-control" id="deadline">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger me-auto" id="btnDelete" style="display:none;">Delete</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var commitmentModal = new bootstrap.Modal(document.getElementById('commitmentModal'));
            var form = document.getElementById('commitmentForm');
            var btnDelete = document.getElementById('btnDelete');
            var loginOverlay = document.getElementById('loginOverlay');
            var loginForm = document.getElementById('loginForm');

            const themeStylesheet = document.getElementById('themeStylesheet');
            const themeToggleBtn = document.getElementById('themeToggleBtn');
            const navLogoutBtn = document.getElementById('navLogoutBtn');
            let isDarkTheme = localStorage.getItem('theme') !== 'light';

            function applyTheme(isDark) {
                if (isDark) {
                    themeStylesheet.href = "https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css";
                    document.getElementById('calendar').style.background = "#222";
                    themeToggleBtn.innerHTML = "☀️ Light Mode";
                    themeToggleBtn.className = "btn btn-outline-light btn-sm me-3";
                    document.body.classList.remove('light-theme');
                } else {
                    themeStylesheet.href = "https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css";
                    document.getElementById('calendar').style.background = "white";
                    themeToggleBtn.innerHTML = "🌙 Dark Mode";
                    themeToggleBtn.className = "btn btn-outline-dark btn-sm me-3";
                    document.body.classList.add('light-theme');
                }
            }

            applyTheme(isDarkTheme);

            themeToggleBtn.addEventListener('click', () => {
                isDarkTheme = !isDarkTheme;
                localStorage.setItem('theme', isDarkTheme ? 'dark' : 'light');
                applyTheme(isDarkTheme);
            });

            navLogoutBtn.addEventListener('click', function() {
                localStorage.removeItem('token');
                window.location.reload();
            });

            function getAuthHeaders() {
                var token = localStorage.getItem('token');
                return {
                    'Content-Type': 'application/json',
                    'Authorization': token ? 'Bearer ' + token : ''
                };
            }

            function logout() {
                localStorage.removeItem('token');
                loginOverlay.style.display = 'flex';
            }

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                var params = new URLSearchParams();
                params.append('username', document.getElementById('loginUsername').value);
                params.append('password', document.getElementById('loginPassword').value);
                
                fetch('/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                })
                .then(response => {
                    if (!response.ok) throw new Error("Invalid credentials");
                    return response.json();
                })
                .then(data => {
                    localStorage.setItem('token', data.access_token);
                    loginOverlay.style.display = 'none';
                    calendar.refetchEvents();
                })
                .catch(err => Swal.fire('Login Error', err.message, 'error'));
            });

            if (!localStorage.getItem('token')) {
                loginOverlay.style.display = 'flex';
            } else {
                loginOverlay.style.display = 'none';
            }

            function getEventColor(status) {
                switch(status) {
                    case 'done': return '#28a745'; // green
                    case 'expired': return '#dc3545'; // red
                    case 'to check': return '#fd7e14'; // orange/yellow
                    case 'not actual': return '#6c757d'; // gray
                    case 'ideas backlog': return '#0d6efd'; // blue
                    default: return '#3788d8';
                }
            }

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                editable: true,
                dayMaxEvents: 3,
                contentHeight: 'auto',
                allDaySlot: false,
                eventTimeFormat: {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                },
                eventDidMount: function(info) {
                    var props = info.event.extendedProps;
                    var tooltipText = 'Project: ' + (props.project || 'N/A') + '\n' +
                                      'Reviewer: ' + (props.reviewer || 'N/A') + '\n' +
                                      'Description: ' + (props.description || 'No description');
                    info.el.setAttribute('title', tooltipText);
                },
                eventDrop: function(info) {
                    var id = info.event.id;
                    var newDate = info.event.start;
                    
                    const year = newDate.getFullYear();
                    const month = String(newDate.getMonth() + 1).padStart(2, '0');
                    const day = String(newDate.getDate()).padStart(2, '0');
                    const hours = String(newDate.getHours()).padStart(2, '0');
                    const minutes = String(newDate.getMinutes()).padStart(2, '0');
                    var formattedDeadline = `${year}-${month}-${day}T${hours}:${minutes}:00`;

                    fetch(`/commitments/${id}`, {
                        method: 'PUT',
                        headers: getAuthHeaders(),
                        body: JSON.stringify({ deadline: formattedDeadline })
                    })
                    .then(response => {
                        if (response.status === 401) { logout(); throw new Error("Unauthorized"); }
                        if (!response.ok) throw new Error("Failed to update deadline");
                        
                        Swal.fire({ toast: true, position: 'bottom-end', icon: 'success', title: 'Deadline updated!', showConfirmButton: false, timer: 3000 });
                        calendar.refetchEvents();
                    })
                    .catch(err => {
                        info.revert();
                        Swal.fire('Error', err.message, 'error');
                    });
                },
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                events: function(info, successCallback, failureCallback) {
                    var projectFilter = document.getElementById('filterProject').value.trim();
                    var reviewerFilter = document.getElementById('filterReviewer').value.trim();
                    
                    var queryParams = [];
                    if (projectFilter) {
                        queryParams.push('project=' + encodeURIComponent(projectFilter));
                    }
                    if (reviewerFilter) {
                        queryParams.push('reviewer=' + encodeURIComponent(reviewerFilter));
                    }
                    
                    var url = '/commitments/';
                    if (queryParams.length > 0) {
                        url += '?' + queryParams.join('&');
                    }

                    fetch(url, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } })
                        .then(response => {
                            if (response.status === 401) { logout(); throw new Error("Unauthorized"); }
                            return response.json();
                        })
                        .then(data => {
                            var now = new Date();
                            var doneCount = 0;
                            var toCheckCount = 0;
                            var expiredCount = 0;

                            var events = data.map(item => {
                                // Auto-expired logic
                                var itemStatus = item.status;
                                if (item.deadline && itemStatus !== 'done' && itemStatus !== 'not actual') {
                                    var deadlineDate = new Date(item.deadline);
                                    if (now > deadlineDate) {
                                        itemStatus = 'expired';
                                    }
                                }

                                if (itemStatus === 'done') doneCount++;
                                if (itemStatus === 'to check') toCheckCount++;
                                if (itemStatus === 'expired') expiredCount++;

                                return {
                                    id: item.id,
                                    title: item.title,
                                    start: item.deadline ? item.deadline : item.created_at,
                                    backgroundColor: getEventColor(itemStatus),
                                    borderColor: getEventColor(itemStatus),
                                    extendedProps: item
                                };
                            });

                            document.getElementById('statDone').innerText = doneCount;
                            document.getElementById('statToCheck').innerText = toCheckCount;
                            document.getElementById('statExpired').innerText = expiredCount;

                            successCallback(events);
                        })
                        .catch(err => {
                            console.error("Error fetching commitments:", err);
                            failureCallback(err);
                        });
                },
                dateClick: function(info) {
                    form.reset();
                    document.getElementById('commitmentId').value = '';
                    document.getElementById('modalTitle').innerText = 'Create Commitment';
                    document.getElementById('status').value = 'to check';

                    const d = info.date;
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    const localDateTime = `${year}-${month}-${day}T00:00`;
                    document.getElementById('deadline').value = localDateTime;

                    btnDelete.style.display = 'none';
                    commitmentModal.show();
                },
                eventClick: function(info) {
                    var evt = info.event;
                    var props = evt.extendedProps;

                    document.getElementById('commitmentId').value = evt.id;
                    document.getElementById('modalTitle').innerText = 'Edit Commitment';
                    
                    document.getElementById('title').value = props.title || '';
                    document.getElementById('author').value = props.author || '';
                    document.getElementById('description').value = props.description || '';
                    document.getElementById('project').value = props.project || '';
                    document.getElementById('assignee').value = props.assignee || '';
                    document.getElementById('reviewer').value = props.reviewer || '';
                    
                    if (props.deadline) {
                        let d = new Date(props.deadline);
                        const year = d.getFullYear();
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const day = String(d.getDate()).padStart(2, '0');
                        const hours = String(d.getHours()).padStart(2, '0');
                        const minutes = String(d.getMinutes()).padStart(2, '0');
                        document.getElementById('deadline').value = `${year}-${month}-${day}T${hours}:${minutes}`;
                    } else {
                        document.getElementById('deadline').value = '';
                    }

                    document.getElementById('status').value = props.status || 'to check';

                    btnDelete.style.display = 'inline-block';
                    commitmentModal.show();
                }
            });

            calendar.render();

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                var id = document.getElementById('commitmentId').value;
                
                var data = {
                    title: document.getElementById('title').value,
                    author: document.getElementById('author').value,
                    description: document.getElementById('description').value || null,
                    project: document.getElementById('project').value || null,
                    assignee: document.getElementById('assignee').value || null,
                    reviewer: document.getElementById('reviewer').value || null,
                    status: document.getElementById('status').value
                };

                let rawDeadline = document.getElementById('deadline').value;
                let finalDeadline = rawDeadline ? rawDeadline : null;
                data.deadline = finalDeadline;

                var method = id ? 'PUT' : 'POST';
                var url = id ? `/commitments/${id}` : '/commitments/';

                fetch(url, {
                    method: method,
                    headers: getAuthHeaders(),
                    body: JSON.stringify(data)
                })
                .then(response => {
                    if (response.status === 401) { logout(); throw new Error("Unauthorized"); }
                    if (!response.ok) {
                        return response.text().then(text => { throw new Error(text) });
                    }
                    return response.json();
                })
                .then(() => {
                    commitmentModal.hide();
                    calendar.refetchEvents();
                    Swal.fire({ toast: true, position: 'bottom-end', icon: 'success', title: 'Saved successfully!', showConfirmButton: false, timer: 3000 });
                })
                .catch(err => {
                    console.error("Error saving:", err);
                    Swal.fire('Error', err.message, 'error');
                });
            });

            btnDelete.addEventListener('click', function() {
                var id = document.getElementById('commitmentId').value;
                if (!id) return;

                Swal.fire({
                    title: 'Are you sure?',
                    text: "You won't be able to revert this!",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#6c757d',
                    confirmButtonText: 'Yes, delete it!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        fetch(`/commitments/${id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                        })
                        .then(response => {
                            if (response.status === 401) { logout(); throw new Error("Unauthorized"); }
                            if (!response.ok) {
                                return response.text().then(text => { throw new Error(text) });
                            }
                        })
                        .then(() => {
                            commitmentModal.hide();
                            calendar.refetchEvents();
                            Swal.fire({ toast: true, position: 'bottom-end', icon: 'success', title: 'Deleted successfully!', showConfirmButton: false, timer: 3000 });
                        })
                        .catch(err => {
                            console.error("Error deleting:", err);
                            Swal.fire('Error', err.message, 'error');
                        });
                    }
                });
            });

            // Filter Event Listeners
            document.getElementById('btnApplyFilters').addEventListener('click', function() {
                calendar.refetchEvents();
            });

            document.getElementById('btnClearFilters').addEventListener('click', function() {
                document.getElementById('filterProject').value = '';
                document.getElementById('filterReviewer').value = '';
                calendar.refetchEvents();
            });
        });
    </script>
</body>
</html>
